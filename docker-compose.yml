version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - MLFLOW_TRACKING_URI=sqlite:///mlruns/mlruns.db
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./mlruns:/app/mlruns
      - ./logs:/app/logs
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: mlflow server --backend-store-uri sqlite:///mlruns/mlruns.db --default-artifact-root /mlruns/artifacts --host 0.0.0.0

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: diabetes_user
      POSTGRES_PASSWORD: diabetes_pass
      POSTGRES_DB: diabetes_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
